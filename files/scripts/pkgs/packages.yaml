# Fe02-OS Package Management
# Build-time repos are ephemeral — set up before install, cleaned up after

repos:
  url:
    tailscale: "https://pkgs.tailscale.com/stable/fedora/tailscale.repo"
  copr:
    - scottames/ghostty

packages:
  remove:
    - firefox
    - firefox-langpacks
    - yelp
    - gnome-classic-session
    - gnome-shell-extension*
    - gnome-tour

  # Installed on every image, regardless of variant.
  common:
    - neovim
    - distrobox
    - dfu-util
    - stow
    - fastfetch
    - tailscale
    - btop

  # Only variant-specific packages.
  variants:
    gnome:
      packages:
        - gnome-tweaks
        - adw-gtk3-theme
        - ghostty
    cosmic:
      packages:
        - ghostty
    kde:
      packages:
        - gnome-disk-utility

  gaming:
    repos:
      # Key = package name used for cleanup via `dnf remove`
      rpm:
        rpmfusion-free-release: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-${FEDORA_VERSION}.noarch.rpm"
        rpmfusion-nonfree-release: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-${FEDORA_VERSION}.noarch.rpm"
      copr: []
    packages:
      - steam
      - lutris
      - mangohud

# This is here to remove desktop entries for packages that you cannot remove,
# and/or do not want to see or otherwise interact with.
desktop_entries:
  remove:
    common: []
    gnome:
      - org.freedesktop.MalcontentControl.desktop
    cosmic: []
    kde: []