# Fe02-OS Package Management
# Format: Define packages by desktop environment and gaming variant
# The install script will merge base + gaming packages when GAMING=true

packages:
  # Packages to remove across all variants
  remove:
    - firefox
    - firefox-langpacks
    - yelp
    - gnome-tour
    - gnome-system-monitor
    - gnome-shell-extension-background-logo
    - gnome-shell-extension-window-list
    - gnome-shell-extension-places-menu
    - gnome-shell-extension-launch-new-instance
    - gnome-shell-extension-apps-menu
    - gnome-shell-extension-common
    - gnome-classic-session

  # Desktop environment variants
  variants:
    cosmic:
      base:
        - ark
        - neovim
        - distrobox
        - stow
        - fastfetch
        - tailscale
        - btop
      gaming:
        - steam

    gnome:
      base:
        - adw-gtk3-theme
        - gnome-tweaks
        - gnome-shell-extension-gsconnect
        - neovim
        - distrobox
        - stow
        - fastfetch
        - tailscale
        - btop
      gaming:
        - steam

    kde:
      base:
        - neovim
        - distrobox
        - dfu-util
        - gnome-disk-utility
        - stow
        - fastfetch
        - tailscale
        - btop
      gaming:
        - steam
