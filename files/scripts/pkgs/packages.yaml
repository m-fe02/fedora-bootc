# Fe02-OS Package Management
# Format: Define packages by desktop environment and gaming variant
# The install script will merge base + gaming packages when GAMING=true

packages:
  # Packages to remove across all variants
  remove:
    - firefox
    - firefox-langpacks
    - yelp

  # Desktop environment variants
  variants:
    cosmic:
      base:
        - neovim
        - distrobox
        - stow
        - fastfetch
        - tailscale
        - btop
      gaming:
        - steam
        - lutris
        - mangohud
        - ollama

    kde:
      base:
        - neovim
        - distrobox
        - dfu-util
        - gnome-disk-utility
        - stow
        - fastfetch
        - tailscale
        - btop
      gaming:
        - steam
        - lutris
        - mangohud
        - ollama
