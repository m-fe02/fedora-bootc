# Fe02-OS Package Management
# Build-time repos are ephemeral — set up before install, cleaned up after

repos:
  # Fetched via curl → /etc/yum.repos.d/<name>.repo, removed after install
  url:
    tailscale: "https://pkgs.tailscale.com/stable/fedora/tailscale.repo"
  # dnf copr enable → disabled after install
  copr: []

packages:
  remove:
    - firefox
    - firefox-langpacks
    - yelp

  # Installed for every variant
  common:
    - neovim
    - distrobox
    - dfu-util
    - stow
    - fastfetch
    - tailscale
    - btop

  # Only variant-specific packages — common packages are not repeated here
  # DE is already provided by the base image
  variants:
    gnome:
      packages: []
    cosmic:
      packages: []
    kde:
      packages:
        - gnome-disk-utility

  gaming:
    repos:
      # Key = package name used for cleanup via `dnf remove`
      rpm:
        rpmfusion-free-release: "https://mirrors.rpmfusion.org/free/fedora/rpmfusion-free-release-${FEDORA_VERSION}.noarch.rpm"
        rpmfusion-nonfree-release: "https://mirrors.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-${FEDORA_VERSION}.noarch.rpm"
      copr: []
    packages:
      - steam
      - lutris
      - mangohud
