name: Deploy Images to GHCR

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 6'
  workflow_dispatch:

# Required permissions for signing with Cosign
permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    name: build-and-push (${{ matrix.tag }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - desktop: kde
            base_image: quay.io/fedora-ostree-desktops/kinoite
            tag: kde
            gaming: false
          - desktop: kde
            base_image: quay.io/fedora-ostree-desktops/kinoite
            tag: kde-gaming
            gaming: true
          - desktop: gnome
            base_image: quay.io/fedora-ostree-desktops/silverblue
            tag: gnome
            gaming: false
          - desktop: gnome
            base_image: quay.io/fedora-ostree-desktops/silverblue
            tag: gnome-gaming
            gaming: true
          - desktop: cosmic
            base_image: quay.io/fedora-ostree-desktops/cosmic-atomic
            tag: cosmic
            gaming: false
          - desktop: cosmic
            base_image: quay.io/fedora-ostree-desktops/cosmic-atomic
            tag: cosmic-gaming
            gaming: true
    defaults:
      run:
        working-directory: '.'
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@main

      - name: 'Install Cosign'
        uses: sigstore/cosign-installer@v3.8.2

      - name: 'Delete huge unnecessary tools folder'
        run: rm -rf /opt/hostedtoolcache

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Build and Push Image'
        run: |
          podman build \
            --build-arg BASE_IMAGE_NAME=${{ matrix.base_image }} \
            --build-arg DESKTOP_ENV=${{ matrix.desktop }} \
            --build-arg GAMING=${{ matrix.gaming }} \
            --tag ghcr.io/m-fe02/fe02-os:${{ matrix.tag }} \
            -f Containerfile
          podman push ghcr.io/m-fe02/fe02-os:${{ matrix.tag }}
          podman system prune -a -f

      - name: 'Sign Image'
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}
        run: |
          cosign sign --yes --key env://COSIGN_PRIVATE_KEY ghcr.io/m-fe02/fe02-os:${{ matrix.tag }}
